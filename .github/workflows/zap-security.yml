name: OWASP ZAP Security Scan

# DAST — escaneo pasivo de la app en runtime (sin explotar vulnerabilidades).
# Demo de clase: descargar artefacto "zap-security-report" y revisar alertas HTML/MD.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  zap-baseline:
    name: ZAP Baseline — SauceDemo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5.0.0

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'https://www.saucedemo.com'
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          artifact_name: 'zap-security-report'
          cmd_options: '-a'
          allow_issue_writing: false
          fail_action: false
